services:
  # Broker MQTT unique pour MeshQTT — port hôte 1883 (arrêter les autres Mosquitto sur ce port)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: meshqtt-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
